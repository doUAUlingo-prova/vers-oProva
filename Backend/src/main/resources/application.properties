server.port=8080

# Configuração LOCAL para a prova
# O PostgreSQL sobe pelo docker-compose na porta 5434 do computador.
spring.datasource.url=jdbc:postgresql://localhost:5434/douaulingo
spring.datasource.username=postgres
spring.datasource.password=postgres

# Cria/atualiza as tabelas automaticamente com base nas entidades Java.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false

# Chave local usada para assinar/validar o token JWT.
jwt.secret=dev-local-secret-key-for-douaulingo-proof-2026
